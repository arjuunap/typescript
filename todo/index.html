<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9f9f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
      /* align-items: center; */
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin: 1.5rem 0;
    }

    #taskInput {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      border: 0.5px solid #ccc;
      border-radius: 12px;
      background: #fff;
      color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #taskInput:focus { border-color: #888; }
    #taskInput::placeholder { color: #bbb; font-weight: 300; }

    #addBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s ease, opacity 0.15s;
      line-height: 1;
    }

    #addBtn:hover { opacity: 0.75; }
    #addBtn:active { transform: scale(0.92); }

    #taskList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #taskList li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: #fff;
      border: 0.5px solid #e8e8e8;
      border-radius: 12px;
      font-size: 14px;
      color: #1a1a1a;
      transition: border-color 0.2s;
      animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #taskList li:hover { border-color: #ccc; }

    #taskList li.done {
      text-decoration: line-through;
      color: #bbb;
    }

    #taskList li.removing {
      animation: slideOut 0.25s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); max-height: 80px; padding: 13px 14px; margin: 0; }
      to   { opacity: 0; transform: translateX(50px); max-height: 0; padding: 0; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Task Manager</h1>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter task" />
      <button id="addBtn">+</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="dist/todo.js"></script>
</body>
</html>
